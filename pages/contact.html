<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Nike Inspired</title>
  <link rel="stylesheet" href="../style.css">

</head>

<body>


  <header class="navbar">
    <div class="logo">
      <img src="../images/nike-logo-0.png" alt="Logo">
    </div>


    <input type="checkbox" id="menu-toggle">
    <label for="menu-toggle" class="hamburger">☰</label>

    <nav>
      <ul class="nav-links">
        <li><a href="../index.html" class="active">Home</a></li>
        <li><a href="../pages/men.html">Men</a></li>
        <li><a href="../pages/women.html">Women</a></li>
        <li><a href="../pages/kids.html">Kids</a></li>
        <li><a href="../pages/collection.html">Collection</a></li>
        <li><a href="../pages/review.html">Reviews</a></li>
        <li><a href="../pages/contact.html">Contact</a></li>
        <li><a href="../pages/login.html">Login</a></li>
      </ul>
    </nav>
  </header>


  <div class="contact-form" style="margin-top: 10%;">
    <h2>Share Your Feedback</h2>
    <form action="#" method="post" enctype="multipart/form-data">
      <fieldset>
        <legend>Contact & Feedback</legend>

        <div class="form-grid">

          <div class="column">
            <label for="fullname">Full Name</label>
            <input id="fullname" name="fullname" type="text" required placeholder="Full Name">

            <label for="email">Email</label>
            <input id="email" name="email" type="email" required placeholder="Email">

            <label for="phone">Phone</label>
            <input id="phone" name="phone" type="tel" placeholder="Phone Number">

            <label for="category">Category</label>
            <select id="category" name="category" required>
              <option value="">-- Select Category --</option>
              <option value="product">Product Feedback</option>
              <option value="service">Service Feedback</option>
              <option value="other">Other</option>
            </select>
          </div>


          <div class="column">
            <label for="file">Upload Screenshot (optional)</label>
            <input id="file" name="file" type="file" accept=".jpg,.jpeg,.png,.pdf">

            <label for="message">Your Message</label>
            <textarea id="message" name="message" rows="4" placeholder="Write your feedback..." required></textarea>

            <label for="rating">Rate Us (0-10)</label>
            <input id="rating" name="rating" type="range" min="0" max="10" value="5">
          </div>
        </div>

        <label class="checkbox-row">
          <input type="checkbox" required>
          <span>I confirm my feedback is genuine.</span>
        </label>

        <div class="controls">
          <input type="reset" value="Reset">
          <input type="submit" value="Submit">
        </div>
      </fieldset>
    </form>
  </div>
  <section class="map-section">
    <h2>Visit Our Store</h2>
    <p>Find us on the map below. We're always happy to welcome you!</p>
    <div class="map-container">
      <iframe
        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3650.517775888659!2d90.40670707510752!3d23.80199307861713!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3755c7f9c2f3b2b3%3A0x8f7e6f3b6e9d3c3e!2sNike%20Store%20Dhaka!5e0!3m2!1sen!2sbd!4v1700000000000"
        width="100%" height="350" style="border:0;" allowfullscreen="" loading="lazy"
        referrerpolicy="no-referrer-when-downgrade">
      </iframe>
    </div>
  </section>



  <footer class="footer">
    <div class="footer-content">
      <div class="footer-left">
        <h3>Nike Inspired</h3>

      </div>
      <div class="footer-right">

          <li><a href="#">About</a></li>

        <div class="social-icons">

        </div>
      </div>
    </div>
  </footer>

</body>

</html>
